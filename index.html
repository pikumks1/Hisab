<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Hisab Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" style="display: flex; height: 100vh; width: 100%; align-items: center; justify-content: center;">
        <div class="form-card" style="text-align: center; max-width: 400px; width: 100%; padding: 40px;">
            <h2 style="margin-bottom: 10px;">Welcome to Hisab</h2>
            <p style="color: #6b7280; margin-bottom: 30px;">Please log in to manage your expenses.</p>
            <button id="login-btn" class="save-btn" style="background: white; color: #333; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20">
                Sign in with Google
            </button>
        </div>
    </div>

    <div class="container" id="app-container" style="display: none;">
        <div class="left-panel">
            <div class="balance-card">
                <div class="balance-header">
                    <span><i class="fa-solid fa-wallet"></i> Current Balance</span>
                    <button id="logout-btn" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer;">Logout</button>
                </div>
                <h1 id="total-balance">₹ 0.00</h1>
                <div class="balance-stats">
                    <div><i class="fa-solid fa-arrow-down" style="color: #4ade80;"></i> Income <br><strong id="income-total">₹ 0.00</strong></div>
                    <div><i class="fa-solid fa-arrow-up" style="color: #f87171;"></i> Expenses <br><strong id="expense-total">₹ 0.00</strong></div>
                </div>
            </div>

            <div class="form-card">
                <h3>Add Transaction</h3>
                <div class="input-group">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <select id="type">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-indian-rupee-sign"></i>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-file-invoice"></i>
                    <input type="text" id="desc" placeholder="What was this for?">
                </div>
                
                <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                    <div class="input-group" style="flex: 1; margin-bottom: 0;">
                        <i class="fa-solid fa-layer-group"></i>
                        <select id="category">
                            </select>
                    </div>
                    <button type="button" id="add-new-cat-btn" style="background: #6b4ce6; color: white; border: none; border-radius: 8px; width: 50px; cursor: pointer; font-size: 20px;" title="Add Custom Category">+</button>
                </div>

                <button class="save-btn" id="save-btn">Save Transaction</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="section-header">
                <h3>Recent Transactions</h3>
            </div>
            <ul id="expense-list" class="transaction-list"></ul>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
